<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マラソンチームアプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; }
    nav { scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ─────────────────────────────────────────────────────────────────────────────
  //  JSONBin.io 設定（ここを編集してください）
  // ─────────────────────────────────────────────────────────────────────────────
  const JSONBIN_API_KEY = "$2a$10$KJDnoGzXeC.hF7c1u/T9TuJ7iVIVn1bYZqhONzkgP/rudDB9uF04W";
  const JSONBIN_BIN_ID  = "6a1ab28d21f9ee59d29d3c1a";

  // ── 初期データ ────────────────────────────────────────────────────────────────
  const INITIAL_DATA = {
    settings: { raceName: "2026 富士山マラソン", raceDate: "2026-12-13" },
    members: ["Masato", "Akiyuki", "Yuki"],
    goals: { Masato: 200, Akiyuki: 200, Yuki: 200 },
    logs: [],
    avail: {},
  };

  const API_READY =
    JSONBIN_API_KEY !== "ここにAPIキーを貼る" &&
    JSONBIN_BIN_ID  !== "ここにBin IDを貼る";

  // ── JSONBin.io API ────────────────────────────────────────────────────────────
  async function fetchData() {
    if (!API_READY) return INITIAL_DATA;
    try {
      const res = await fetch(
        `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
        { headers: { "X-Master-Key": JSONBIN_API_KEY } }
      );
      if (!res.ok) throw new Error(res.statusText);
      const json = await res.json();
      return { ...INITIAL_DATA, ...json.record };
    } catch (e) {
      console.error("JSONBin fetch error:", e);
      return INITIAL_DATA;
    }
  }

  async function pushData(data) {
    if (!API_READY) return;
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": JSONBIN_API_KEY,
      },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(res.statusText);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  const today = () => new Date().toISOString().slice(0, 10);

  function daysUntil(dateStr) {
    const diff = new Date(dateStr) - new Date(today());
    return Math.ceil(diff / 86400000);
  }

  function getMonthDays(year, month) {
    const first = new Date(year, month, 1).getDay();
    const days = new Date(year, month + 1, 0).getDate();
    return { first, days };
  }

  function padded(n) { return String(n).padStart(2, "0"); }

  // 皇居1周 = 5km
  const KOKEN_KM = 5;
  function toKoken(km) {
    const laps = km / KOKEN_KM;
    if (laps === 0) return "0";
    return Number.isInteger(laps) ? `${laps}` : laps.toFixed(1);
  }
  // "10 km / 皇居2周" のような文字列を返す
  function fmtKm(km) {
    return `${km} km / 皇居${toKoken(km)}周`;
  }

  const MEDAL_COLOR = ["#FFD700", "#C0C0C0", "#CD7F32", "#94a3b8", "#94a3b8"];
  const MEDAL_EMOJI = ["🥇", "🥈", "🥉", "4位", "5位"];

  // ── App ───────────────────────────────────────────────────────────────────────
  function App() {
    const [loading, setLoading]       = useState(true);
    const [saveStatus, setSaveStatus] = useState(""); // "saving" | "saved" | "error" | ""
    const [tab, setTab]               = useState("dashboard");
    const [members, setMembers]       = useState(INITIAL_DATA.members);
    const [settings, setSettings]     = useState(INITIAL_DATA.settings);
    const [logs, setLogs]             = useState(INITIAL_DATA.logs);
    const [goals, setGoals]           = useState(INITIAL_DATA.goals);
    const [avail, setAvail]           = useState(INITIAL_DATA.avail);
    const [calMonth, setCalMonth] = useState(() => {
      const now = new Date();
      return { year: now.getFullYear(), month: now.getMonth() };
    });

    // ── 常に最新の全状態を保持するref（保存時の競合防止） ────────────────────
    const stateRef  = useRef({ settings, members, goals, logs, avail });
    const saveTimer = useRef(null);

    useEffect(() => {
      stateRef.current = { settings, members, goals, logs, avail };
    }, [settings, members, goals, logs, avail]);

    useEffect(() => {
      fetchData().then(data => {
        setMembers(data.members  || INITIAL_DATA.members);
        setSettings(data.settings || INITIAL_DATA.settings);
        setLogs(data.logs        || INITIAL_DATA.logs);
        setGoals(data.goals      || INITIAL_DATA.goals);
        setAvail(data.avail      || {});
        setLoading(false);
      });
    }, []);

    // 300ms debounce で常に最新状態を1回だけ保存（競合なし）
    function scheduleSave() {
      if (!API_READY) return;
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(async () => {
        saveTimer.current = null;
        setSaveStatus("saving");
        try {
          await pushData(stateRef.current);
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus(""), 2000);
        } catch {
          setSaveStatus("error");
          setTimeout(() => setSaveStatus(""), 3000);
        }
      }, 300);
    }

    // リロード前に未送信の保存を即時フラッシュ
    async function flushSave() {
      if (!API_READY) return;
      if (saveTimer.current) {
        clearTimeout(saveTimer.current);
        saveTimer.current = null;
      }
      try {
        await pushData(stateRef.current);
      } catch {}
    }

    function addLog(entry) {
      setLogs(prev => [...prev, { id: Date.now(), ...entry }]);
      scheduleSave();
    }

    function editLog(id, updates) {
      setLogs(prev => prev.map(l => l.id === id ? { ...l, ...updates } : l));
      scheduleSave();
    }

    function deleteLog(id) {
      setLogs(prev => prev.filter(l => l.id !== id));
      scheduleSave();
    }

    function saveSettings(newSettings, newGoals, newMembers) {
      setSettings(newSettings);
      setGoals(newGoals);
      setMembers(newMembers);
      scheduleSave();
    }

    function updateAvail(newAvail) {
      setAvail(newAvail);
      scheduleSave();
    }

    const totalByMember = members.reduce((acc, m) => {
      acc[m] = logs.filter(l => l.member === m).reduce((s, l) => s + l.km, 0);
      return acc;
    }, {});

    const ranked   = [...members].sort((a, b) => totalByMember[b] - totalByMember[a]);
    const daysLeft = daysUntil(settings.raceDate);

    if (loading) return (
      <div style={{ minHeight: "100vh", background: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
        <div style={{ width: 32, height: 32, border: "3px solid #1e293b", borderTopColor: "#38bdf8", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <span style={{ color: "#64748b", fontSize: 14 }}>データを読み込み中...</span>
        <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
      </div>
    );

    const saveColor = saveStatus === "error" ? "#f87171" : saveStatus === "saved" ? "#4ade80" : "#94a3b8";
    const saveLabel = saveStatus === "saving" ? "保存中..." : saveStatus === "saved" ? "✓ 保存済み" : saveStatus === "error" ? "保存エラー" : "";

    async function reloadFromCloud() {
      if (!API_READY) return;
      await flushSave();   // 未送信の保存を先にフラッシュ
      setLoading(true);
      const data = await fetchData();
      setMembers(data.members  || INITIAL_DATA.members);
      setSettings(data.settings || INITIAL_DATA.settings);
      setLogs(data.logs        || INITIAL_DATA.logs);
      setGoals(data.goals      || INITIAL_DATA.goals);
      setAvail(data.avail      || {});
      setLoading(false);
    }

    return (
      <div style={styles.root}>
        {/* Header */}
        <header style={styles.header}>
          <div style={styles.headerInner}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={styles.headerRace}>{settings.raceName}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {saveLabel && <span style={{ fontSize: 11, color: saveColor }}>{saveLabel}</span>}
                {API_READY && (
                  <button
                    onClick={reloadFromCloud}
                    title="クラウドから最新データを取得"
                    style={{ background: "rgba(56,189,248,0.1)", border: "1px solid rgba(56,189,248,0.25)", borderRadius: 6, color: "#38bdf8", fontSize: 14, padding: "3px 8px", cursor: "pointer" }}
                  >
                    🔄
                  </button>
                )}
                {!API_READY && (
                  <span style={{ fontSize: 10, color: "#f87171", background: "rgba(248,113,113,0.1)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: 5, padding: "2px 6px" }}>
                    未接続
                  </span>
                )}
              </div>
            </div>
            <div style={styles.headerSub}>
              <span style={{ color: daysLeft > 30 ? "#4ade80" : "#f87171" }}>
                {daysLeft > 0 ? `残り ${daysLeft} 日` : "大会終了"}
              </span>
              <span style={{ color: "#475569", margin: "0 6px" }}>|</span>
              <span style={{ color: "#64748b" }}>{settings.raceDate}</span>
            </div>
          </div>
        </header>

        {/* Tabs */}
        <nav style={styles.nav}>
          {[
            { id: "dashboard", label: "📊 概況" },
            { id: "log",       label: "➕ 記録" },
            { id: "ranking",   label: "🏆 ランキング" },
            { id: "schedule",  label: "📅 日程調整" },
            { id: "settings",  label: "⚙️ 設定" },
          ].map(t => (
            <button
              key={t.id}
              style={{ ...styles.tabBtn, ...(tab === t.id ? styles.tabActive : {}) }}
              onClick={() => setTab(t.id)}
            >
              {t.label}
            </button>
          ))}
        </nav>

        {/* Content */}
        <main style={styles.main}>
          {tab === "dashboard" && (
            <Dashboard members={members} ranked={ranked} totalByMember={totalByMember} goals={goals} logs={logs} settings={settings} />
          )}
          {tab === "log" && (
            <LogEntry members={members} logs={logs} onAdd={addLog} onEdit={editLog} onDelete={deleteLog} />
          )}
          {tab === "ranking" && (
            <Ranking ranked={ranked} totalByMember={totalByMember} goals={goals} />
          )}
          {tab === "schedule" && (
            <Schedule
              members={members} avail={avail} setAvail={updateAvail}
              calMonth={calMonth} setCalMonth={setCalMonth}
              raceDate={settings.raceDate}
            />
          )}
          {tab === "settings" && (
            <Settings settings={settings} goals={goals} members={members} onSave={saveSettings} />
          )}
        </main>
      </div>
    );
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────────
  function Dashboard({ members, ranked, totalByMember, goals, logs, settings }) {
    const recent   = [...logs].sort((a, b) => {
      const d = b.date.localeCompare(a.date);
      return d !== 0 ? d : b.id - a.id;
    }).slice(0, 20);
    const daysLeft = daysUntil(settings.raceDate);

    return (
      <div style={styles.section}>
        <h2 style={styles.sectionTitle}>チーム概況</h2>

        {/* 大会カウントダウン */}
        <div style={{ background: "linear-gradient(135deg,rgba(56,189,248,0.07),rgba(99,102,241,0.07))", border: "1px solid rgba(56,189,248,0.18)", borderRadius: 14, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{settings.raceName}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>📅 {settings.raceDate}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            {daysLeft > 0 ? (
              <>
                <div style={{ fontSize: 32, fontWeight: 800, color: daysLeft > 30 ? "#38bdf8" : "#f87171", lineHeight: 1 }}>{daysLeft}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>日後</div>
              </>
            ) : (
              <div style={{ fontSize: 15, fontWeight: 700, color: "#f87171" }}>大会終了</div>
            )}
          </div>
        </div>

        <div style={styles.goalGrid}>
          {ranked.map((m, i) => {
            const pct    = Math.min(100, Math.round((totalByMember[m] / (goals[m] || 1)) * 100));
            const remain = Math.max(0, (goals[m] || 0) - totalByMember[m]);
            return (
              <div key={m} style={styles.goalCard}>
                <div style={styles.goalCardTop}>
                  <span style={{ fontSize: 18 }}>{MEDAL_EMOJI[i]}</span>
                  <span style={styles.goalCardName}>{m}</span>
                  <div style={{ textAlign: "right" }}>
                    <div style={styles.goalCardKm}>{totalByMember[m]} km</div>
                    <div style={{ fontSize: 10, color: "#64748b" }}>皇居{toKoken(totalByMember[m])}周</div>
                  </div>
                </div>
                <div style={styles.progressTrack}>
                  <div style={{ ...styles.progressFill, width: `${pct}%`, background: i === 0 ? "#FFD700" : i === 1 ? "#94a3b8" : i === 2 ? "#CD7F32" : "#38bdf8" }} />
                </div>
                <div style={styles.goalCardBot}>
                  <span style={{ color: "#64748b", fontSize: 11 }}>目標 {fmtKm(goals[m] || 0)}</span>
                  <span style={{ color: "#94a3b8", fontSize: 11 }}>あと {fmtKm(remain)} ({pct}%)</span>
                </div>
              </div>
            );
          })}
        </div>

        <h3 style={styles.subTitle}>最近の記録</h3>
        <div style={styles.logList}>
          {recent.map(l => (
            <div key={l.id} style={styles.logRow}>
              <div style={styles.logAvatar}>{l.member[0]}</div>
              <span style={styles.logMember}>{l.member}</span>
              <span style={styles.logDate}>{l.date}</span>
              <div style={{ textAlign: "right" }}>
                <div style={styles.logKm}>{l.km} km</div>
                <div style={{ fontSize: 10, color: "#64748b" }}>皇居{toKoken(l.km)}周</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Log Entry ─────────────────────────────────────────────────────────────────
  function LogEntry({ members, logs, onAdd, onEdit, onDelete }) {
    const [member, setMember] = useState(members[0]);
    const [date, setDate]     = useState(today());
    const [km, setKm]         = useState("");
    const [done, setDone]     = useState(false);

    const [editId,          setEditId]          = useState(null);
    const [editMember,      setEditMember]      = useState("");
    const [editDate,        setEditDate]        = useState("");
    const [editKm,          setEditKm]          = useState("");
    const [confirmDeleteId, setConfirmDeleteId] = useState(null);

    function handleSubmit() {
      const n = Number(km);
      if (!n || n <= 0) return;
      onAdd({ member, date, km: n });
      setKm("");
      setDone(true);
      setTimeout(() => setDone(false), 2000);
    }

    function startEdit(log) {
      setEditId(log.id);
      setEditMember(log.member);
      setEditDate(log.date);
      setEditKm(String(log.km));
      setConfirmDeleteId(null);
    }

    function saveEdit() {
      const n = Number(editKm);
      if (!n || n <= 0) return;
      onEdit(editId, { member: editMember, date: editDate, km: n });
      setEditId(null);
    }

    function handleDelete(id) {
      onDelete(id);
      setConfirmDeleteId(null);
    }

    const sorted = [...logs].sort((a, b) => {
      const d = b.date.localeCompare(a.date);
      return d !== 0 ? d : b.id - a.id;
    });

    const btnSm = {
      background: "none", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
      color: "#94a3b8", cursor: "pointer", fontSize: 13, padding: "3px 10px",
    };

    return (
      <div style={styles.section}>
        <h2 style={styles.sectionTitle}>ランニングを記録</h2>

        {/* 追加フォーム */}
        <div style={styles.formCard}>
          <label style={styles.label}>メンバー</label>
          <div style={styles.memberBtnRow}>
            {members.map(m => (
              <button
                key={m}
                style={{ ...styles.memberBtn, ...(member === m ? styles.memberBtnActive : {}) }}
                onClick={() => setMember(m)}
              >
                <div style={{ ...styles.memberBtnAvatar, background: member === m ? "linear-gradient(135deg,#38bdf8,#6366f1)" : "#1e293b" }}>{m[0]}</div>
                <span>{m}</span>
              </button>
            ))}
          </div>

          <label style={styles.label}>日付</label>
          <input type="date" style={styles.input} value={date} onChange={e => setDate(e.target.value)} />

          <label style={styles.label}>距離 (km)</label>
          <input
            type="number" min="0.1" step="0.1"
            style={styles.input} value={km}
            onChange={e => setKm(e.target.value)}
            placeholder="例: 10.5"
          />

          {/* 皇居プリセット */}
          <div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6 }}>🏯 皇居周回で選ぶ</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {[0.5, 1, 2, 3, 4, 5].map(n => {
                const val = String(n * KOKEN_KM);
                const active = km === val;
                return (
                  <button
                    key={n}
                    onClick={() => setKm(val)}
                    style={{
                      background: active ? "rgba(56,189,248,0.2)" : "rgba(255,255,255,0.05)",
                      border: `1px solid ${active ? "rgba(56,189,248,0.6)" : "rgba(255,255,255,0.1)"}`,
                      borderRadius: 7, color: active ? "#38bdf8" : "#94a3b8",
                      fontSize: 12, padding: "5px 10px", cursor: "pointer", whiteSpace: "nowrap",
                    }}
                  >
                    {n}周 <span style={{ color: "#475569" }}>({n * KOKEN_KM}km)</span>
                  </button>
                );
              })}
            </div>
          </div>

          <button
            style={{ ...styles.primaryBtn, ...(done ? styles.primaryBtnDone : {}) }}
            onClick={handleSubmit}
          >
            {done ? `✅ ${member} の記録を追加しました！` : "記録する"}
          </button>
        </div>

        {/* 記録一覧（編集・削除） */}
        <h3 style={{ ...styles.subTitle, marginTop: 28 }}>記録一覧（{logs.length}件）</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {sorted.map(l => (
            editId === l.id ? (
              /* ── インライン編集フォーム ── */
              <div key={l.id} style={{ ...styles.logRow, flexDirection: "column", alignItems: "stretch", gap: 8, padding: "12px" }}>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <select
                    value={editMember}
                    onChange={e => setEditMember(e.target.value)}
                    style={{ ...styles.input, flex: 1, minWidth: 80 }}
                  >
                    {members.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                  <input type="date" style={{ ...styles.input, flex: 1, minWidth: 120 }} value={editDate} onChange={e => setEditDate(e.target.value)} />
                  <input type="number" min="0.1" step="0.1" style={{ ...styles.input, width: 80, flexShrink: 0 }} value={editKm} onChange={e => setEditKm(e.target.value)} placeholder="km" />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={saveEdit} style={{ ...styles.primaryBtn, flex: 1, padding: "8px 0", fontSize: 13, marginTop: 0 }}>✓ 保存</button>
                  <button onClick={() => setEditId(null)} style={{ ...btnSm, padding: "8px 16px" }}>キャンセル</button>
                </div>
              </div>
            ) : (
              /* ── 通常行 ── */
              <div key={l.id} style={{ ...styles.logRow, gap: 8 }}>
                <div style={styles.logAvatar}>{l.member[0]}</div>
                <span style={{ ...styles.logMember, minWidth: 0 }}>{l.member}</span>
                <span style={styles.logDate}>{l.date}</span>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={styles.logKm}>{l.km} km</div>
                  <div style={{ fontSize: 10, color: "#64748b" }}>皇居{toKoken(l.km)}周</div>
                </div>
                <button onClick={() => { startEdit(l); }} style={{ ...btnSm, color: "#38bdf8", borderColor: "rgba(56,189,248,0.3)", flexShrink: 0 }}>編集</button>
                {confirmDeleteId === l.id ? (
                  <span style={{ display: "flex", gap: 4, alignItems: "center", flexShrink: 0 }}>
                    <button onClick={() => handleDelete(l.id)} style={{ ...btnSm, color: "#f87171", borderColor: "rgba(248,113,113,0.4)", padding: "3px 8px" }}>削除</button>
                    <button onClick={() => setConfirmDeleteId(null)} style={{ ...btnSm, padding: "3px 6px" }}>✕</button>
                  </span>
                ) : (
                  <button onClick={() => setConfirmDeleteId(l.id)} style={{ ...btnSm, flexShrink: 0 }}>🗑</button>
                )}
              </div>
            )
          ))}
          {sorted.length === 0 && (
            <p style={{ fontSize: 13, color: "#475569", textAlign: "center", padding: "20px 0" }}>まだ記録がありません</p>
          )}
        </div>
      </div>
    );
  }

  // ── Ranking ───────────────────────────────────────────────────────────────────
  function Ranking({ ranked, totalByMember, goals }) {
    const max = totalByMember[ranked[0]] || 1;
    return (
      <div style={styles.section}>
        <h2 style={styles.sectionTitle}>距離ランキング</h2>
        {ranked.map((m, i) => {
          const pct    = Math.round((totalByMember[m] / (goals[m] || 1)) * 100);
          const remain = Math.max(0, (goals[m] || 0) - totalByMember[m]);
          return (
            <div key={m} style={styles.rankRow}>
              <div style={{ ...styles.rankNum, color: MEDAL_COLOR[i] }}>{MEDAL_EMOJI[i]}</div>
              <div style={styles.rankInfo}>
                <div style={styles.rankName}>{m}</div>
                <div style={styles.rankBarTrack}>
                  <div style={{ ...styles.rankBarFill, width: `${(totalByMember[m] / max) * 100}%`, background: MEDAL_COLOR[i] }} />
                </div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>
                  あと {fmtKm(remain)}（{pct}% 達成）
                </div>
              </div>
              <div style={styles.rankRight}>
                <div style={styles.rankKm}>{totalByMember[m]}</div>
                <div style={{ fontSize: 10, color: "#64748b" }}>km</div>
                <div style={{ fontSize: 10, color: "#64748b" }}>皇居{toKoken(totalByMember[m])}周</div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  // ── Schedule ──────────────────────────────────────────────────────────────────
  function Schedule({ members, avail, setAvail, calMonth, setCalMonth, raceDate }) {
    const [activeMember, setActiveMember] = useState(members[0]);
    const { year, month } = calMonth;
    const { first, days } = getMonthDays(year, month);

    function toggleDay(dateStr) {
      const cur = avail[dateStr] || {};
      const newAvail = { ...avail, [dateStr]: { ...cur, [activeMember]: !cur[activeMember] } };
      setAvail(newAvail);
    }

    function prevMonth() {
      setCalMonth(({ year, month }) => month === 0 ? { year: year - 1, month: 11 } : { year, month: month - 1 });
    }
    function nextMonth() {
      setCalMonth(({ year, month }) => month === 11 ? { year: year + 1, month: 0 } : { year, month: month + 1 });
    }

    const monthStr  = `${year}-${padded(month + 1)}`;
    const monthName = new Date(year, month, 1).toLocaleDateString("ja-JP", { year: "numeric", month: "long" });

    const fullDays = Array.from({ length: days }, (_, i) => {
      const d   = `${monthStr}-${padded(i + 1)}`;
      const cnt = members.filter(m => (avail[d] || {})[m]).length;
      return { d, cnt };
    });
    const bestDays = fullDays.filter(x => x.cnt === members.length).map(x => x.d);

    return (
      <div style={styles.section}>
        <h2 style={styles.sectionTitle}>練習日程調整</h2>

        <p style={styles.hint}>入力するメンバーを選んでカレンダーをタップ</p>
        <div style={styles.memberBtnRow}>
          {members.map(m => (
            <button
              key={m}
              style={{ ...styles.memberBtn, ...(activeMember === m ? styles.memberBtnActive : {}) }}
              onClick={() => setActiveMember(m)}
            >
              <div style={{ ...styles.memberBtnAvatar, background: activeMember === m ? "linear-gradient(135deg,#38bdf8,#6366f1)" : "#1e293b" }}>{m[0]}</div>
              <span>{m}</span>
            </button>
          ))}
        </div>

        <div style={styles.calNav}>
          <button style={styles.calNavBtn} onClick={prevMonth}>‹</button>
          <span style={styles.calMonthLabel}>{monthName}</span>
          <button style={styles.calNavBtn} onClick={nextMonth}>›</button>
        </div>

        <div style={styles.calGrid}>
          {["日","月","火","水","木","金","土"].map(d => (
            <div key={d} style={styles.calDow}>{d}</div>
          ))}
          {Array.from({ length: first }).map((_, i) => <div key={`e${i}`} />)}
          {Array.from({ length: days }, (_, i) => {
            const n        = i + 1;
            const dateStr  = `${monthStr}-${padded(n)}`;
            const dayAvail = avail[dateStr] || {};
            const meAvail  = !!dayAvail[activeMember];
            const cnt      = members.filter(m => dayAvail[m]).length;
            const isRace   = dateStr === raceDate;
            const isAll    = cnt === members.length && cnt > 0;
            return (
              <button
                key={n}
                style={{
                  ...styles.calDay,
                  ...(meAvail ? styles.calDayMe : {}),
                  ...(isAll   ? styles.calDayAll  : {}),
                  ...(isRace  ? styles.calDayRace : {}),
                }}
                onClick={() => !isRace && toggleDay(dateStr)}
              >
                <span style={{ fontSize: 12 }}>{n}</span>
                {isRace
                  ? <span style={{ fontSize: 8, color: "#f87171" }}>🏁</span>
                  : (
                    <div style={{ display: "flex", gap: 1.5, flexWrap: "wrap", justifyContent: "center" }}>
                      {members.map(m => (
                        <div key={m} title={`${m}: ${dayAvail[m] ? "◯" : "−"}`} style={{
                          width: 5, height: 5, borderRadius: "50%",
                          background: dayAvail[m] ? "#4ade80" : "rgba(255,255,255,0.13)",
                        }} />
                      ))}
                    </div>
                  )
                }
              </button>
            );
          })}
        </div>

        <div style={styles.legend}>
          <LegendItem color="rgba(56,189,248,0.4)" label="自分◯" />
          <LegendItem color="#4ade80"              label="全員◯" />
          <LegendItem color="rgba(248,113,113,0.4)" label="大会日" />
          <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#64748b" }}>
            <span style={{ display: "flex", gap: 2 }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#4ade80", display: "inline-block" }} />
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "rgba(255,255,255,0.13)", display: "inline-block" }} />
            </span>
            各ドット＝メンバー参加可否
          </span>
        </div>

        {bestDays.length > 0 && (
          <div style={styles.bestDaysBox}>
            🎉 全員参加可能な日：{bestDays.map(d => d.slice(5).replace("-", "/")).join("、")}
          </div>
        )}
      </div>
    );
  }

  function LegendItem({ color, label }) {
    return (
      <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: color, display: "inline-block" }} />
        {label}
      </span>
    );
  }

  // ── Settings ──────────────────────────────────────────────────────────────────
  function Settings({ settings, goals, members, onSave }) {
    const [raceName,       setRaceName]       = useState(settings.raceName);
    const [raceDate,       setRaceDate]       = useState(settings.raceDate);
    const [localGoals,     setLocalGoals]     = useState({ ...goals });
    const [localMembers,   setLocalMembers]   = useState([...members]);
    const [newMemberName,  setNewMemberName]  = useState("");
    const [memberError,    setMemberError]    = useState("");
    const [saved, setSaved] = useState(false);

    function addMember() {
      const name = newMemberName.trim();
      if (!name) return;
      if (localMembers.includes(name)) {
        setMemberError("同じ名前のメンバーが既にいます");
        return;
      }
      setLocalMembers(prev => [...prev, name]);
      setLocalGoals(prev => ({ ...prev, [name]: 200 }));
      setNewMemberName("");
      setMemberError("");
    }

    function removeMember(name) {
      if (localMembers.length <= 1) {
        setMemberError("メンバーは最低1人必要です");
        return;
      }
      setLocalMembers(prev => prev.filter(m => m !== name));
      setLocalGoals(prev => {
        const next = { ...prev };
        delete next[name];
        return next;
      });
      setMemberError("");
    }

    function save() {
      onSave({ raceName, raceDate }, localGoals, localMembers);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    }

    return (
      <div style={styles.section}>
        <h2 style={styles.sectionTitle}>設定</h2>
        <div style={styles.formCard}>
          <label style={styles.label}>大会名</label>
          <input style={styles.input} value={raceName} onChange={e => setRaceName(e.target.value)} />

          <label style={styles.label}>大会日</label>
          <input type="date" style={styles.input} value={raceDate} onChange={e => setRaceDate(e.target.value)} />

          {/* ── メンバー管理 ── */}
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 12, marginTop: 4 }}>
            <label style={{ ...styles.label, marginBottom: 10, display: "block" }}>メンバー管理</label>

            {localMembers.map(m => (
              <div key={m} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <div style={{ ...styles.logAvatar, flexShrink: 0 }}>{m[0]}</div>
                <span style={{ flex: 1, fontSize: 14, color: "#e2e8f0" }}>{m}</span>
                <input
                  type="number" min="1"
                  style={{ ...styles.input, width: 80 }}
                  value={localGoals[m] || ""}
                  onChange={e => setLocalGoals(prev => ({ ...prev, [m]: Number(e.target.value) }))}
                  placeholder="目標km"
                />
                <button
                  onClick={() => removeMember(m)}
                  style={{ background: "rgba(248,113,113,0.12)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: 7, color: "#f87171", fontSize: 14, padding: "6px 10px", cursor: "pointer", flexShrink: 0 }}
                >
                  削除
                </button>
              </div>
            ))}

            {/* 新メンバー追加 */}
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <input
                style={{ ...styles.input, flex: 1 }}
                value={newMemberName}
                onChange={e => { setNewMemberName(e.target.value); setMemberError(""); }}
                onKeyDown={e => e.key === "Enter" && addMember()}
                placeholder="新しいメンバーの名前"
              />
              <button
                onClick={addMember}
                style={{ background: "rgba(56,189,248,0.15)", border: "1px solid rgba(56,189,248,0.4)", borderRadius: 7, color: "#38bdf8", fontSize: 14, fontWeight: 700, padding: "0 16px", cursor: "pointer", flexShrink: 0 }}
              >
                ＋ 追加
              </button>
            </div>
            {memberError && <p style={{ fontSize: 11, color: "#f87171", marginTop: 6 }}>{memberError}</p>}
            <p style={{ fontSize: 11, color: "#475569", marginTop: 6 }}>
              ※ 目標距離のデフォルトは 200 km。削除しても記録ログは残ります。
            </p>
          </div>

          <button
            style={{ ...styles.primaryBtn, ...(saved ? styles.primaryBtnDone : {}) }}
            onClick={save}
          >
            {saved ? "✅ 保存しました" : "保存する"}
          </button>

          {!API_READY && (
            <p style={{ fontSize: 11, color: "#f87171", marginTop: 4, lineHeight: 1.6 }}>
              ⚠️ JSONBin.io の APIキー・Bin ID が未設定です。<br />
              index.html の先頭 2 行に API キーと Bin ID を貼り付けると、データがクラウドに保存されてチームで共有できます。
            </p>
          )}
        </div>
      </div>
    );
  }

  // ── Styles ────────────────────────────────────────────────────────────────────

    main: { maxWidth: 640, margin: "0 auto", padding: "16px 12px" },

    goalGrid: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 4 },

    label: { fontSize: 12, color: "#94a3b8", fontWeight: 600 },
    memberBtnRow: { display: "flex", flexWrap: "wrap", gap: 8 },
    memberBtn: {
      display: "flex", flexDirection: "column", alignItems: "center", gap: 5,
      background: "#0f172a", border: "1px solid rgba(255,255,255,0.08)",

      transition: "all 0.15s",
    },
    memberBtnActive: { border: "1px solid rgba(56,189,248,0.6)", color: "#e2e8f0" },
    memberBtnAvatar: {
      width: 32, height: 32, borderRadius: "50%",

    input: {

    rankRow: {

    rankNum: { fontSize: 22, width: 34, textAlign: "center", flexShrink: 0 },

    hint: { fontSize: 12, color: "#94a3b8", marginTop: -8, marginBottom: 12 },

    calNavBtn: {

    },
    calDayMe:   { background: "rgba(56,189,248,0.22)", border: "1px solid rgba(56,189,248,0.55)", color: "#e2e8f0" },
    calDayAll:  { background: "rgba(74,222,128,0.2)",  border: "1px solid #4ade80",               color: "#fff" },
    calDayRace: { background: "rgba(248,113,113,0.12)", border: "1px solid rgba(248,113,113,0.5)", cursor: "default" },

    availRow: { display: "flex", alignItems: "center", padding: "7px 0", gap: 10, borderBottom: "1px solid rgba(255,255,255,0.04)" },

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
